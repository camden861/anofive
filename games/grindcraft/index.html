<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="icon" type="image/x-icon" href="img/pick-nobg.png" />
    <link rel="shortcut icon" type="image/x-icon" href="img/pick.png" />
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no" />
    <meta name="display-mode" content="standalone">
    <script type="text/javascript" src="https://3kh0.github.io/js/main.js"></script>
    <script type="text/javascript" src="//imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
  </head>
  <style>
    body {
      overflow-y: hidden;
      overflow-x: hidden;
      margin: 0px;
      padding: 0px;
    }
  </style>
  <body>
    <div id="turn"></div>
    <div id="gameContainer"></div>

    <script>
  window.open = function (url, target, features) {
    if (url) {
      window.location.href = url;
    }
    return null;
  };

  document.addEventListener("click", function (e) {
    const a = e.target.closest("a[target='_blank']");
    if (!a) return;
    e.preventDefault();
    window.location.href = a.href;
  });

  document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll("a[target='_blank']").forEach(a => {
      a.removeAttribute("target");
    });
  });
</script>
  </body>
</html>
